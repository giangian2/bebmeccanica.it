<VirtualHost *:443>

    ServerName localhost
    DocumentRoot /var/www/html

    CustomLog /var/log/httpd/domains/bebmeccanica.it.bytes bytes
    CustomLog /var/log/httpd/domains/bebmeccanica.it.log combined
    ErrorLog /var/log/httpd/domains/bebmeccanica.it.error.log
    
    <Directory /var/www/html>
        AllowOverride All
        SSLRequireSSL
        Options +Includes -Indexes +ExecCGI
    </Directory>

    SSLEngine on
    SSLCertificateFile "/etc/apache2/ssl/bebmeccanica.pem"
    SSLCertificateKeyFile "/etc/apache2/ssl/bebmeccanica-key.pem"

    <FilesMatch "\.(cgi|shtml|phtml|php)$">
        SSLOptions +StdEnvVars
    </FilesMatch>
        
    <Directory /usr/lib/cgi-bin>
        SSLOptions +StdEnvVars
    </Directory>

</VirtualHost>